- defaults:
    link:
      create: true
      relink: true

- clean: ["~", "~/.config", "~/.claude"]

- link:
    # Shared (linked on all platforms)
    ~/.bashrc:
      path: bashrc
      force: true
    ~/.config/bat: bat
    ~/.config/direnv: direnv
    ~/.config/nvim: nvim
    ~/.config/starship.toml: starship.toml
    ~/.config/zsh: zsh
    ~/.dotfiles: ""
    ~/.gitconfig:
    ~/.gitignore:
    ~/.gitmessage:
    ~/.tmux.conf:
    ~/.tmux/workspaces: tmux/workspaces
    ~/.tmux/themes: tmux/themes
    ~/.zshenv:
      path: zsh/zshenv.shim
      force: true
    ~/.markdownlint-cli2.jsonc: .markdownlint-cli2.jsonc
    ~/bin: bin
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md
      force: true
    ~/.claude/settings.json:
      path: claude/settings.json
      force: true
    ~/.claude/keybindings.json: claude/keybindings.json

    # macOS-only (GUI apps and window/keyboard management)
    ~/.config/ghostty:
      path: ghostty
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/karabiner.edn:
      path: karabiner.edn
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/karabiner:
      path: karabiner
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/kitty:
      path: kitty
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/skhd:
      path: skhd
      if: '[ "$(uname)" = "Darwin" ]'
    ~/.config/yabai:
      path: yabai
      if: '[ "$(uname)" = "Darwin" ]'
    ~/Library/Application Support/qmk/qmk.ini:
      path: qmk/qmk.ini
      if: '[ "$(uname)" = "Darwin" ]'

- shell:
    - git submodule update --init --recursive
    - '[ -n "$TMUX" ] && tmux source-file "${HOME}/.tmux.conf"; true'
    - tic -x ./terminfo/tmux-256color.terminfo # custom terminfo w/ italics
    - command -v bat >/dev/null 2>&1 && bat cache --build || true # update the binary cache for bat (skipped if bat unavailable)
