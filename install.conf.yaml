- defaults:
    link:
      create: true
      relink: true

- clean: ["~", "~/.config", "~/.claude"]

- link:
    ~/.bashrc:
    ~/.config/bat: bat
    ~/.config/direnv: direnv
    ~/.config/ghostty: ghostty
    ~/.config/karabiner.edn: karabiner.edn
    ~/.config/karabiner: karabiner
    ~/.config/kitty: kitty
    ~/.config/nvim: nvim
    ~/.config/skhd: skhd
    ~/.config/starship.toml: starship.toml
    ~/.config/yabai: yabai
    ~/.dotfiles: ""
    ~/.gitconfig:
    ~/.gitignore:
    ~/.gitmessage:
    ~/.tmux.conf:
    ~/.tmux/workspaces: tmux/workspaces
    ~/.tmux/themes: tmux/themes
    ~/.zshenv: zsh/zshenv.shim
    ~/.config/zsh: zsh
    ~/.markdownlint-cli2.jsonc: .markdownlint-cli2.jsonc
    ~/bin: bin
    ~/.claude/CLAUDE.md:
      path: claude/CLAUDE.md
      force: true
    ~/.claude/settings.json:
      path: claude/settings.json
      force: true
    ~/.claude/hooks:
      path: claude/hooks
      force: true
    ~/Library/Application Support/qmk/qmk.ini: qmk/qmk.ini

- shell:
    - git submodule update --init --recursive
    - '[ -n "$TMUX" ] && tmux source-file "${HOME}/.tmux.conf"; true'
    - tic -x ./terminfo/tmux-256color.terminfo # custom terminfo w/ italics
    - bat cache --build # update the binary cache for bat
